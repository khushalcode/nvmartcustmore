<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A Multi-vendor Food. Grocery, eCommerce, Pharmacy & Parcel service.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nx Mart">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <meta name="google-signin-client_id" content="491987943015-agln6biv84krpnngdphj87jkko7r9lb8.apps.googleusercontent.com">

  <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

  <title>Nx Mart</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js" defer></script>

  <script>
    // Injected by flutter build — do not touch.
    var serviceWorkerVersion = null;
  </script>

  <!-- Flutter bootstrap JS -->
  <script src="flutter.js" defer></script>
</head>

<body>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcjWCXPa1AThOgXU9IrfT0l0kt33JJYkw"></script>

  <!-- Firebase compat SDKs (v8 style — matches your firebase-messaging usage) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

  <!-- Preloader shown until Flutter app mounts -->
  <div class="preloader">
    <div class="preloader-container">
      <img width="50" class="preloader-img" src="favicon.png" alt="">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Skeleton header shown while app loads -->
  <header class="header">
    <div class="header-container d-flex align-items-center justify-content-between">
      <div class="header-start d-flex gap-5 align-items-center">
        <img class="logo" src="logo.png" alt="">
        <div class="placeholder placeholder-wide"></div>
        <div class="placeholder"></div>
        <div class="placeholder"></div>
        <div class="placeholder"></div>
      </div>
      <div class="header-end d-flex gap-5">
        <div class="placeholder"></div>
        <div class="placeholder"></div>
        <div class="placeholder"></div>
      </div>
    </div>
  </header>

  <!-- Theme detection from localStorage -->
  <script>
    if (typeof(Storage) !== "undefined") {
      var itemValue = localStorage.getItem("flutter.6ammart_theme");
      if (itemValue !== null) {
        if (itemValue === "true") {
          document.body.classList.add("theme-dark");
        } else {
          document.body.classList.remove("theme-light");
        }
      }
    }
  </script>

  <!-- SVG inline replacement -->
  <script>
    document.querySelectorAll("img.svg").forEach(function (img) {
      var imgID = img.getAttribute("id");
      var imgClass = img.getAttribute("class");
      var imgURL = img.getAttribute("src");
      var xhr = new XMLHttpRequest();
      xhr.open("GET", imgURL, true);
      xhr.responseType = "document";
      xhr.onload = function () {
        if (xhr.status === 200) {
          var svg = xhr.response.querySelector("svg");
          if (typeof imgID !== "undefined") svg.setAttribute("id", imgID);
          if (typeof imgClass !== "undefined") svg.setAttribute("class", imgClass + " replaced-svg");
          svg.removeAttribute("xmlns:a");
          if (!svg.getAttribute("viewBox") && svg.getAttribute("height") && svg.getAttribute("width")) {
            svg.setAttribute("viewBox", "0 0 " + svg.getAttribute("height") + " " + svg.getAttribute("width"));
          }
          img.parentNode.replaceChild(svg, img);
        }
      };
      xhr.send();
    });
  </script>

  <!-- Flutter app bootstrap — clean, no duplicate loader -->
  <script>
    function removePreloader() {
      var preloader = document.querySelector('.preloader');
      var header = document.querySelector('.header');
      if (preloader) preloader.remove();
      if (header) header.remove();
    }

    window.addEventListener('load', function () {
      _flutter.loader.load({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine({ renderer: 'html' }).then(function (appRunner) {
            removePreloader();
            appRunner.runApp();
          });
        }
      });
    });
  </script>

</body>
